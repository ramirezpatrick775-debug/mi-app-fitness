<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚡ GYM MASTER PRO ⚡</title>
    <style>
        :root { --neon-green: #22c55e; --bg-dark: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 550px; border-top: 5px solid var(--neon-green); }
        h2 { text-align: center; color: var(--neon-green); }
        .input-group { margin-bottom: 15px; }
        label { font-size: 0.9em; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #334155; border: none; color: white; border-radius: 6px; }
        button { width: 100%; padding: 15px; background: var(--neon-green); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        .res-box { background: white; color: #1e293b; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .day { background: #f8fafc; padding: 12px; margin: 10px 0; border-left: 5px solid var(--neon-green); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏋️‍♂️ GYM MASTER PRO</h2>
        <div class="input-group"><label>Peso (kg)</label><input type="number" id="peso"></div>
        <div class="input-group"><label>Altura (cm)</label><input type="number" id="altura"></div>
        <div class="input-group"><label>Edad</label><input type="number" id="edad"></div>
        <div class="input-group"><label>Sexo</label><select id="sexo"><option value="masculino">Masculino</option><option value="femenino">Femenino</option></select></div>
        <div class="input-group"><label>Nivel</label><select id="nivel"><option value="principiante">Principiante</option><option value="intermedio">Intermedio<option value="avanzado">Avanzado</option></select></div>
        <div class="input-group"><label>Objetivo</label><select id="objetivo"><option value="deficit">Perder Grasa</option><option value="volumen">Ganar Masa</option></select></div>
        
        <button onclick="generarPlan()">GENERAR MI PLAN PRO</button>

        <div id="res" class="res-box">
            <h3>Tu Estrategia Fitness</h3>
            <p>🔥 <b>Calorías Meta:</b> <span id="r-cal"></span></p>
            <div id="r-rutina"></div>
            <div id="r-dieta"></div>
            <button onclick="descargarPlanPDF()" style="background:#2563eb; color:white;">📥 Descargar PDF</button>
        </div>
    </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
