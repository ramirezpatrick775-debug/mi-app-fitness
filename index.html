<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Rutina Fitness</title>
</head>
<body>

    <h2>Calculadora Fitness Personalizada</h2>
    
    <!-- Formulario de entrada -->
    <div id="formulario">
        <input type="number" id="peso" placeholder="Peso (kg)">
        <input type="number" id="altura" placeholder="Altura (cm)">
        <input type="number" id="edad" placeholder="Edad">
        
        <select id="sexo">
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
        </select>
        
        <select id="objetivo">
            <option value="deficit">Déficit (Perder Grasa)</option>
            <option value="volumen">Volumen (Ganar Músculo)</option>
        </select>
        
        <select id="premium">
            <option value="no">Cuenta Gratis</option>
            <option value="si">Cuenta Premium</option>
        </select>
        
        <button onclick="procesarDatos()">CALCULAR PLAN DE ENTRENO</button>
    </div>

    <!-- Área de resultados (oculta por defecto) -->
    <div id="resultados" style="display:none; margin-top: 20px;">
        <h3>Tus Resultados:</h3>
        <p>Calorías diarias: <span id="res-calorias"></span></p>
        <p>Carbohidratos: <span id="res-carbos"></span>g | Proteínas: <span id="res-proteinas"></span>g | Grasas: <span id="res-grasas"></span>g</p>
        
        <div id="res-comidas"></div>
        <div id="res-rutina"></div>

        <!-- Botón para descargar -->
        <button onclick="descargarPlanPDF()" style="background-color: #22c55e; color: white; padding: 12px; border: none; border-radius: 6px; margin-top: 20px; cursor: pointer;">
            📥 Descargar Plan en PDF
        </button>
    </div>

    <!-- LIBRERÍAS Y SCRIPTS (El orden es fundamental aquí) -->
    
    <!-- 1. Cargamos la librería para generar el PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- 2. Cargamos tu lógica -->
    <script src="app.js"></script>
</body>
</html>
