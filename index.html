<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Fitness Pro</title>
    
    <!-- LIBRERÍA PARA GENERAR EL PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            padding: 20px; 
            display: flex; 
            justify-content: center;
            margin: 0;
        }
        .container { 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 550px; 
            border: 1px solid #334155;
        }
        h2 { 
            text-align: center; 
            color: #22c55e; 
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }
        h3, h4 {
            color: #22c55e;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px;
            color: #94a3b8;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            background-color: #0f172a;
            border: 1px solid #475569; 
            border-radius: 8px; 
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #22c55e;
        }
        .btn-principal { 
            background-color: #22c55e; 
            color: #0f172a; 
            font-size: 16px; 
            font-weight: bold;
            text-transform: uppercase;
            border: none; 
            border-radius: 8px;
            padding: 14px;
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%;
        }
        .btn-principal:hover { background-color: #4ade80; }
        
        /* Botón de descarga de PDF con estilo llamativo */
        .btn-pdf {
            background-color: #ef4444;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 6px;
            padding: 10px 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-pdf:hover { background-color: #f87171; }

        /* Contenedor de Resultados con estilo de Gimnasio */
        .resultados { 
            margin-top: 25px; 
            padding: 25px; 
            background: #0f172a; 
            border-radius: 12px; 
            border: 2px solid #22c55e;
            display: none; 
        }
        .macro-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .macro-box {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }
        .macro-box span {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #22c55e;
            margin-top: 5px;
        }
        ul { padding-left: 20px; margin: 10px 0; }
        li { margin-bottom: 10px; color: #cbd5e1; font-size: 14px; }
        hr { border: 0; border-top: 1px solid #334155; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ GYMAPP PRO ⚡</h2>
    
    <div class="form-group">
        <label>Peso Corporal (kg):</label>
        <input type="number" id="peso" placeholder="Ej: 84">
    </div>
    <div class="form-group">
        <label>Altura (cm):</label>
        <input type="number" id="altura" placeholder="Ej: 190">
    </div>
    <div class="form-group">
        <label>Edad (Años):</label>
        <input type="number" id="edad" placeholder="Ej: 24">
    </div>
    <div class="form-group">
        <label>Género / Sexo:</label>
        <select id="sexo">
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
        </select>
    </div>
    <div class="form-group">
        <label>Objetivo Fitness:</label>
        <select id="objetivo">
            <option value="deficit">Déficit Calórico (Perder Grasa)</option>
            <option value="volumen">Superávit (Aumentar Masa Muscular)</option>
        </select>
    </div>
    <div class="form-group">
        <label>Nivel de Membresía:</label>
        <select id="premium">
            <option value="no">Plan Gratuito (Básico)</option>
            <option value="si">Plan Premium (Acceso Total)</option>
        </select>
    </div>

    <button class="btn-principal" onclick="procesarDatos()">Calcular Plan de Entreno</button>

    <!-- Caja de resultados que se convertirá en PDF -->
    <div id="resultados" class="resultados">
        <!-- Contenedor interno exclusivo para el diseño del PDF -->
        <div id="contenido-pdf" style="padding: 10px;">
            <div style="text-align: center; border-bottom: 2px solid #22c55e; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin: 0; font-size: 22px;">🏋️‍♂️ MI COMPAÑERO DE ENTRENAMIENTO 🏋️‍♂️</h2>
                <p style="font-size: 12px; color: #94a3b8; margin: 5px 0 0 0;">Plan de alimentación y rutina semanal personalizada</p>
            </div>

            <h3>📊 Tu Plan Personalizado:</h3>
            <div class="macro-grid">
                <div class="macro-box">🔥 Calorías <span id="res-calorias"></span> <small>kcal</small></div>
                <div class="macro-box">🍞 Carbos <span id="res-carbos"></span> <small>g</small></div>
                <div class="macro-box">🍗 Proteínas <span id="res-proteinas"></span> <small>g</small></div>
                <div class="macro-box">🥑 Grasas <span id="res-grasas"></span> <small>g</small></div>
            </div>
            
            <hr>
            <h4>🛒 Carbohidratos Recomendados:</h4>
            <div id="res-comidas"></div>
            
            <hr>
            <h4>💪 Tu Rutina Semanal Asignada:</h4>
            <div id="res-rutina" style="color: #e2e8f0; font-size: 14px; line-height: 1.6;"></div>
        </div>

        <!-- BOTÓN DE DESCARGA (Se queda fuera del contenido-pdf para que no se imprima a sí mismo) -->
      <button onclick="descargarPlanPDF()" style="background-color: #22c55e; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px;">
    📥 Descargar Plan en PDF
</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
